
name: Deploy to another repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push to another repository
        uses: cpina/github-action-push-to-another-repository@v1.7.0
        with:
          source-directory: '.'
          destination-github-username: 'LJPearson176'
          destination-repository-name: 'vision_arcade'
          user-email: 'github-actions[bot]@users.noreply.github.com'
          user-name: 'github-actions[bot]'
          target-branch: 'main'
          commit-message: 'Deploy from Firebase Studio'
          # IMPORTANT: The API_TOKEN_GITHUB secret must be created in the repository
          # settings of THIS project, not the destination repository.
          # Go to Settings > Secrets and variables > Actions > New repository secret.
          api-token-github: ${{ secrets.API_TOKEN_GITHUB }}
    